<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zero Cup AI Copilot</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0B0B0F;
    color: white;
}

.container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.sidebar h2 {
    font-size: 18px;
    margin-bottom: 20px;
}

.chat-list {
    flex: 1;
    overflow-y: auto;
}

.chat-item {
    padding: 10px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    cursor: pointer;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* Messages */
.msg {
    padding: 12px;
    border-radius: 10px;
    max-width: 70%;
    white-space: pre-wrap;
}

.user {
    background: #3b82f6;
    align-self: flex-end;
}

.bot {
    background: rgba(255,255,255,0.1);
    align-self: flex-start;
}

/* Input */
.input-area {
    display: flex;
    padding: 15px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: #8b5cf6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #7c3aed;
}

.loading {
    opacity: 0.7;
    font-style: italic;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🚀 AI Copilot</h2>

        <div class="chat-list">
            <div class="chat-item">New Chat</div>
            <div class="chat-item">AI Ideas</div>
            <div class="chat-item">Startup Plans</div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="header">
            <h3>Welcome to AI Startup Generator</h3>
        </div>

        <div id="chat" class="chat-box"></div>

        <div class="input-area">
            <input id="input" placeholder="Ask anything..." />
            <button onclick="send()">Send</button>
        </div>

    </div>

</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const loading = document.createElement("div");
    loading.className = "msg bot loading";
    loading.innerText = "Generating startup idea...";
    chat.appendChild(loading);

    try {
        const res = await fetch("/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ topic: text })
        });

        const data = await res.json();

        loading.remove();

        const idea = data.idea;

        const formatted =
`🚀 Startup Idea
${idea.startup_idea}

❗ Problem
${idea.problem}

💡 Solution
${idea.solution}

💰 Monetization
${idea.monetization}`;

        addMessage(formatted, "bot");

    } catch (err) {
        loading.remove();
        addMessage("Error connecting to backend", "bot");
    }
}
</script>

</body>
</html>
