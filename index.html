<!DOCTYPE html>
<html>
<head>
    <title>StudyVault AI</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: 50px auto;
        }

        textarea {
            width: 100%;
            height: 150px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        .box {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>📚 StudyVault AI</h1>

<p>Write anything → Save permanently on 0G Storage</p>

<textarea id="note" placeholder="Type your study notes..."></textarea>
<br>

<button onclick="saveNote()">Save to 0G 🚀</button>

<div class="box" id="output"></div>

<script>
async function saveNote() {
    const text = document.getElementById("note").value;
    const output = document.getElementById("output");

    output.innerText = "Uploading to 0G... ⏳";

    const res = await fetch("/save", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ text })
    });

    const data = await res.json();

    if (data.success) {
        output.innerText =
`✅ SUCCESS!

📦 Root Hash:
${data.rootHash}

🔗 TX:
${data.tx.txHash || "pending"}

📊 Sequence:
${data.tx.txSeq || "N/A"}`;
    } else {
        output.innerText = "❌ Error: " + data.error;
    }
}
</script>

</body>
</html>
