<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Copilot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0B0B0F;
    color: white;
}

.container {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.logo {
    font-size: 18px;
    margin-bottom: 20px;
    font-weight: bold;
}

.btn {
    padding: 10px;
    margin: 5px 0;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    cursor: pointer;
}

.btn:hover {
    background: rgba(255,255,255,0.15);
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 12px;
    border-radius: 10px;
    max-width: 70%;
    white-space: pre-wrap;
}

.user {
    background: #3b82f6;
    align-self: flex-end;
}

.bot {
    background: rgba(255,255,255,0.1);
    align-self: flex-start;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    background: #8b5cf6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #7c3aed;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🚀 AI Copilot</div>

    <div class="btn" onclick="newChat()">New Chat</div>
    <div class="btn" onclick="quick('AI Ideas')">AI Ideas</div>
    <div class="btn" onclick="quick('Startup Plans')">Startup Plans</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
    AI Startup Generator
</div>

<div id="chat" class="chat"></div>

<div class="input-area">
    <input id="input" placeholder="Ask anything..." />
    <button onclick="send()">Send</button>
</div>

</div>

</div>

<script>
const chat = document.getElementById("chat");

function add(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function newChat() {
    chat.innerHTML = "";
    add("New chat started 🚀", "bot");
}

function quick(topic) {
    document.getElementById("input").value = topic;
    send();
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    add(text, "user");
    input.value = "";

    const loading = document.createElement("div");
    loading.className = "msg bot";
    loading.innerText = "Thinking...";
    chat.appendChild(loading);

    try {
        const res = await fetch("/generate", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({topic:text})
        });

        const data = await res.json();
        loading.remove();

        const idea = data.idea;

        const output =
`🚀 Startup Idea
${idea.startup_idea}

❗ Problem
${idea.problem}

💡 Solution
${idea.solution}

💰 Monetization
${idea.monetization}`;

        add(output, "bot");

    } catch (e) {
        loading.remove();
        add("Backend error", "bot");
    }
}
</script>

</body>
</html>
